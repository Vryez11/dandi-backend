spring:
  application:
    name: nyummy
  datasource:
    url: jdbc:mysql://localhost:3307/${MYSQL_DB}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration/mysql

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
